<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Javi's Board</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  color-scheme: light;
  --bg: #f0f2f5;
  --surface: #fff;
  --border: #dfe1e6;
  --text: #172b4d;
  --text-muted: #5e6c84;
  --accent: #0052cc;
  --accent-light: #e6f0ff;
  --danger: #de350b;
  --danger-light: #ffebe6;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.10);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.16);
  --sidebar-w: 220px;
  --sidebar-cw: 56px;
  --col-w: 272px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);}
.app{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .22s cubic-bezier(.4,0,.2,1),min-width .22s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:100;flex-shrink:0;}
.sidebar.collapsed{width:var(--sidebar-cw);min-width:var(--sidebar-cw);}
.sidebar-header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px 0 16px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;overflow:hidden;}
.logo-wrap{display:flex;align-items:center;gap:9px;overflow:hidden;flex:1;min-width:0;}
.logo-chip{background:var(--accent);color:#fff;border-radius:7px;padding:4px 7px;font-size:13px;font-weight:800;letter-spacing:.3px;flex-shrink:0;}
.sidebar-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;opacity:1;transition:opacity .15s;}
.sidebar.collapsed .sidebar-title{opacity:0;pointer-events:none;}
.toggle-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .22s;line-height:1;}
.toggle-btn:hover{background:var(--bg);color:var(--text);}
.sidebar.collapsed .toggle-btn{transform:rotate(180deg);}
.sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow:hidden;}
.sidebar-footer{padding:8px;border-top:1px solid var(--border);flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);border:none;background:none;cursor:pointer;color:var(--text-muted);font-size:13.5px;font-weight:500;text-align:left;width:100%;transition:background .15s,color .15s;overflow:hidden;white-space:nowrap;position:relative;}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:600;}
.nav-icon{font-size:17px;flex-shrink:0;width:20px;text-align:center;}
.nav-label{opacity:1;transition:opacity .12s;}
.sidebar.collapsed .nav-label{opacity:0;pointer-events:none;}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;flex-shrink:0;transition:opacity .12s;}
.sidebar.collapsed .nav-badge{opacity:0;}
.nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);padding:6px 10px 4px;opacity:1;transition:opacity .12s;white-space:nowrap;}
.sidebar.collapsed .nav-section{opacity:0;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.content-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;gap:10px;}
.content-title{font-size:15px;font-weight:700;}
.filter-scroll{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1;}
.filter-scroll::-webkit-scrollbar{display:none;}
.filter-btn{white-space:nowrap;flex-shrink:0;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.btn-add-main{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s;}
.btn-add-main:hover{background:#0043a8;}
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:5px 18px;display:flex;gap:14px;font-size:11.5px;color:var(--text-muted);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.stats-bar::-webkit-scrollbar{display:none;}
.stats-bar strong{color:var(--text);}
.stat-danger{color:var(--danger)!important;}
.panel{display:none;flex:1;overflow:hidden;}
.panel.active{display:flex;flex-direction:column;}

/* ── BOARD ── */
.board-scroll{flex:1;overflow:auto;}
.board{display:flex;gap:12px;padding:16px;align-items:flex-start;min-width:max-content;}
.column{width:var(--col-w);min-width:var(--col-w);background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;}
.col-header{padding:10px 12px 9px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.col-label{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.col-count{background:var(--bg);border-radius:20px;padding:2px 7px;font-size:11px;font-weight:700;color:var(--text-muted);}
.col-body{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:60px;transition:background .15s;}
.col-body.drag-over{background:var(--accent-light);}
.btn-add-col{margin:4px 8px 10px;padding:7px;border:1.5px dashed var(--border);border-radius:6px;background:none;color:var(--text-muted);font-size:12px;cursor:pointer;text-align:center;transition:all .15s;}
.btn-add-col:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 11px;cursor:grab;box-shadow:var(--shadow);transition:box-shadow .15s;touch-action:none;user-select:none;}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12);}
.card.dragging{opacity:.35;cursor:grabbing;}
.card.touch-drag{box-shadow:var(--shadow-lg);transform:rotate(1.5deg) scale(1.02);z-index:999;position:fixed;pointer-events:none;}
.card-tags{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
.tag{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.tag-priority-high{background:#ffebe6;color:#de350b;}
.tag-priority-medium{background:#fff4e5;color:#ff8b00;}
.tag-priority-low{background:#f4f5f7;color:var(--text-muted);}
.card-title{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px;}
.card-desc{font-size:12px;color:var(--text-muted);line-height:1.45;margin-bottom:7px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-date{font-size:11px;color:var(--text-muted);}
.card-date.overdue{color:var(--danger);font-weight:600;}
.card-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s;}
.card:hover .card-actions,.card:focus-within .card-actions{opacity:1;}
.btn-card{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;font-size:13px;color:var(--text-muted);transition:background .1s;}
.btn-card:hover{background:var(--bg);color:var(--text);}
.btn-card.del:hover{background:var(--danger-light);color:var(--danger);}
.empty-col{text-align:center;color:var(--text-muted);font-size:12px;padding:16px 8px;font-style:italic;}

/* ── NEWS ── */
.news-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.news-filters{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1;}
.news-filters::-webkit-scrollbar{display:none;}
.news-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.last-updated{font-size:11px;color:var(--text-muted);white-space:nowrap;}
.btn-refresh{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.btn-refresh.spinning .ri{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.news-scroll{flex:1;overflow-y:auto;}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:16px 18px;max-width:1400px;}
.news-card{background:var(--surface);border-radius:10px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s,transform .15s;display:flex;flex-direction:column;cursor:pointer;text-decoration:none;color:inherit;}
.news-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.13);transform:translateY(-2px);}
.news-card-img{width:100%;height:170px;object-fit:cover;background:var(--bg);display:block;}
.news-card-img-placeholder{width:100%;height:170px;background:linear-gradient(135deg,#e6f0ff,#f0f4ff);display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.5;}
.news-card-body{padding:14px 15px 12px;flex:1;display:flex;flex-direction:column;gap:8px;}
.news-card-meta{display:flex;align-items:center;justify-content:space-between;}
.news-source-chip{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
.news-date{font-size:11px;color:var(--text-muted);}
.news-card-title{font-size:14px;font-weight:700;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.news-card-excerpt{font-size:12.5px;color:var(--text-muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.news-card-footer{padding-top:8px;border-top:1px solid var(--border);margin-top:4px;display:flex;justify-content:flex-end;}
.news-read-link{font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;}
.skeleton{background:linear-gradient(90deg,#f0f2f5 25%,#e8eaed 50%,#f0f2f5 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
@keyframes shimmer{to{background-position:-200% 0;}}
.skel-card{background:var(--surface);border-radius:10px;border:1px solid var(--border);overflow:hidden;}
.skel-img{height:170px;}.skel-body{padding:14px;display:flex;flex-direction:column;gap:10px;}
.skel-line{height:12px;border-radius:4px;}.skel-line.s{width:38%;}.skel-line.m{width:65%;}.skel-line.f{width:100%;}.skel-line.t{height:16px;}
.news-empty{grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);}
.news-empty .icon{font-size:40px;margin-bottom:12px;}

/* ═══════════════════════════════
   PARAGLIDING TAB
═══════════════════════════════ */
.para-toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 18px; display: flex; align-items: center;
  gap: 12px; flex-shrink: 0; flex-wrap: wrap;
}
.para-toolbar-left { display: flex; align-items: center; gap: 10px; flex: 1; flex-wrap: wrap; }
.para-label { font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }

.radius-select {
  padding: 6px 10px; border-radius: 6px; border: 1.5px solid var(--border);
  font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface);
  cursor: pointer; -webkit-appearance: none;
}
.radius-select:focus { outline: none; border-color: var(--accent); }

.btn-locate {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius);
  border: 1.5px solid var(--accent); background: var(--accent-light);
  font-size: 13px; font-weight: 600; color: var(--accent); cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.btn-locate:hover { background: var(--accent); color: #fff; }
.btn-locate.loading { opacity: .6; pointer-events: none; }

.para-status {
  font-size: 12px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.para-status .dot { width: 8px; height: 8px; border-radius: 50%; background: #97a0af; flex-shrink: 0; }
.para-status .dot.green { background: #00875a; }
.para-status .dot.orange { background: #ff8b00; }
.para-status .dot.red { background: #de350b; }

.para-body {
  flex: 1; display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr auto;
  gap: 0; overflow: hidden;
}

/* Map */
.para-map-wrap {
  grid-row: 1; grid-column: 1;
  border-right: 1px solid var(--border);
  position: relative; min-height: 300px;
}
#paraMap { width: 100%; height: 100%; }

/* Stations panel */
.para-stations-wrap {
  grid-row: 1; grid-column: 2;
  overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  background: var(--bg);
}
.stations-header {
  font-size: 12px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
}

.station-card {
  background: var(--surface); border-radius: 8px;
  border: 1px solid var(--border); padding: 11px 13px;
  cursor: pointer; transition: box-shadow .15s, border-color .15s;
  box-shadow: var(--shadow);
}
.station-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
.station-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }

.station-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.station-name { font-size: 13px; font-weight: 700; color: var(--text); }
.station-dist { font-size: 11px; color: var(--text-muted); }

.station-wind {
  display: flex; align-items: center; gap: 10px;
}
.wind-speed-big {
  font-size: 26px; font-weight: 800; line-height: 1;
}
.wind-speed-big.w-calm   { color: #00875a; }
.wind-speed-big.w-light  { color: #57d9a3; }
.wind-speed-big.w-mod    { color: #ff8b00; }
.wind-speed-big.w-strong { color: #de350b; }

.wind-details { display: flex; flex-direction: column; gap: 3px; }
.wind-detail-row { font-size: 11.5px; color: var(--text-muted); display: flex; gap: 4px; align-items: center; }
.wind-detail-row strong { color: var(--text); }

.wind-arrow {
  width: 36px; height: 36px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); border-radius: 50%; font-size: 20px;
  transition: transform .4s ease;
}

.station-empty {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted); font-size: 13px;
}
.station-empty .icon { font-size: 32px; margin-bottom: 8px; }

/* Graph panel */
.para-graph-wrap {
  grid-column: 1 / -1; grid-row: 2;
  border-top: 1px solid var(--border);
  background: var(--surface); padding: 14px 18px 12px;
  height: 220px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.graph-header {
  display: flex; align-items: center; justify-content: space-between;
}
.graph-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .6px; }
.graph-legend { display: flex; gap: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.legend-dot { width: 10px; height: 3px; border-radius: 2px; }
.graph-canvas-wrap { flex: 1; position: relative; min-height: 0; }
#windChart { width: 100% !important; height: 100% !important; }

/* Wind map markers */
.wind-marker-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.wind-marker-circle {
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 2.5px solid white;
  font-size: 11px; font-weight: 800; color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,.35);
}
.wind-marker-pin {
  width: 2px; height: 8px; background: white;
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
}
.wind-marker-name {
  font-size: 10px; font-weight: 800; color: #172b4d;
  white-space: nowrap; text-shadow: 0 1px 0 white, 0 -1px 0 white, 1px 0 0 white, -1px 0 0 white;
  line-height: 1;
}

/* Loading overlay */
.para-loading {
  position: absolute; inset: 0; background: rgba(240,242,245,.85);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; z-index: 500; font-size: 14px; color: var(--text-muted);
}
.para-loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(9,30,66,.45);z-index:900;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
@media(min-width:520px){.overlay{align-items:center;}}
.modal{background:#fff;border-radius:12px 12px 0 0;padding:22px 20px 28px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;}
@media(min-width:520px){.modal{border-radius:12px;max-width:440px;}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-drag-bar{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
@media(min-width:520px){.modal-drag-bar{display:none;}}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;}
.form-group{margin-bottom:13px;}
.form-group label{display:block;font-size:11.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;color:var(--text);background:var(--surface);transition:border-color .15s;resize:vertical;-webkit-appearance:none;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.btn-cancel{padding:9px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;color:var(--text-muted);}
.btn-save{padding:9px 20px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;flex:1;}
.btn-save:hover{background:#0043a8;}
.settings-panel{background:#fff;border-radius:12px 12px 0 0;padding:22px 20px 36px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;}
@media(min-width:520px){.settings-panel{border-radius:12px;max-width:440px;}}
.settings-panel h2{font-size:16px;font-weight:700;margin-bottom:4px;}
.settings-panel .subtitle{font-size:12px;color:var(--text-muted);margin-bottom:18px;}
.cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.cat-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);}
.cat-swatch{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.1);cursor:pointer;}
.cat-name-input{flex:1;border:none;background:transparent;font-size:13.5px;font-weight:600;color:var(--text);outline:none;font-family:inherit;}
.cat-del-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text-muted);padding:2px 4px;border-radius:4px;transition:all .12s;}
.cat-del-btn:hover{background:var(--danger-light);color:var(--danger);}
.btn-add-cat{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:8px;background:none;color:var(--text-muted);font-size:13px;cursor:pointer;transition:all .15s;}
.btn-add-cat:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.settings-divider{border:none;border-top:1px solid var(--border);margin:18px 0;}
.color-picker-wrap{display:none;flex-wrap:wrap;gap:8px;margin-top:8px;}
.color-picker-wrap.open{display:flex;}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s;}
.color-swatch:hover,.color-swatch.selected{transform:scale(1.2);border-color:var(--text);}

/* ── MOBILE ── */
.bottom-nav{display:none;}
@media(max-width:768px){
  .sidebar{display:none;}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;height:56px;}
  .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:500;color:var(--text-muted);transition:color .15s;padding:6px 0;}
  .bottom-nav-item .nav-icon{font-size:20px;}
  .bottom-nav-item.active{color:var(--accent);}
  .main{padding-bottom:56px;}
  .board{flex-direction:column;min-width:unset;}
  :root{--col-w:calc(100vw - 32px);}
  .news-grid{grid-template-columns:1fr;padding:12px;}
  .para-body{grid-template-columns:1fr;grid-template-rows:300px auto auto;}
  .para-map-wrap{grid-row:1;grid-column:1;border-right:none;border-bottom:1px solid var(--border);}
  .para-stations-wrap{grid-row:2;grid-column:1;max-height:260px;}
  .para-graph-wrap{grid-column:1;grid-row:3;height:200px;}
}
</style>
</head>
<body>
<div class="app">

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-wrap">
      <span class="logo-chip">NE</span>
      <span class="sidebar-title">Javi's Board</span>
    </div>
    <button class="toggle-btn" onclick="toggleSidebar()" title="Collapse">‹</button>
  </div>
  <nav class="sidebar-nav">
    <span class="nav-section">Views</span>
    <button class="nav-item active" id="nav-board" onclick="switchTab('board')">
      <span class="nav-icon">📋</span><span class="nav-label">Tasks</span>
    </button>
    <button class="nav-item" id="nav-news" onclick="switchTab('news')">
      <span class="nav-icon">⚡</span><span class="nav-label">News</span>
      <span class="nav-badge" id="newsBadge" style="display:none">New</span>
    </button>
    <button class="nav-item" id="nav-para" onclick="switchTab('para')">
      <span class="nav-icon">🪂</span><span class="nav-label">Paragliding</span>
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item" onclick="openSettings()">
      <span class="nav-icon">⚙️</span><span class="nav-label">Categories</span>
    </button>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="main">

  <!-- BOARD PANEL -->
  <div class="panel active" id="panel-board">
    <div class="content-header">
      <div class="filter-scroll" id="filterBar"></div>
      <button class="btn-add-main" onclick="openTaskModal()">＋ Task</button>
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="board-scroll"><div class="board" id="board"></div></div>
  </div>

  <!-- NEWS PANEL -->
  <div class="panel" id="panel-news">
    <div class="news-toolbar">
      <div class="news-filters" id="newsFilters"></div>
      <div class="news-meta">
        <span class="last-updated" id="lastUpdated"></span>
        <button class="btn-refresh" id="refreshBtn" onclick="fetchNews(true)">
          <span class="ri">↻</span> Refresh
        </button>
      </div>
    </div>
    <div class="news-scroll"><div class="news-grid" id="newsGrid"></div></div>
  </div>

  <!-- PARAGLIDING PANEL -->
  <div class="panel" id="panel-para">
    <div class="para-toolbar">
      <div class="para-toolbar-left">
        <button class="btn-locate" id="locateBtn" onclick="locateAndFetch()">
          📍 Get my location
        </button>
        <div class="para-status" id="paraStatus">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Press "Get my location" to start</span>
        </div>
      </div>
      <div style="display:flex;gap:4px;align-items:center;flex-shrink:0;font-size:10.5px;color:var(--text-muted)">
        <span title="Station positions from WMO/KNMI/DWD list. Wind values from Open-Meteo ECMWF model at each station coordinate — not direct instrument readings.">ℹ️ ECMWF model @ WMO stations</span>
      </div>
    </div>
    <div class="para-body" id="paraBody">
      <div class="para-map-wrap" id="paraMapWrap">
        <div id="paraMap"></div>
        <div class="para-loading" id="paraLoading" style="display:none">
          <div class="spinner"></div><span>Fetching wind data…</span>
        </div>
      </div>
      <div class="para-stations-wrap" id="paraStations">
        <div class="station-empty"><div class="icon">🪂</div>Location needed to show stations</div>
      </div>
      <div class="para-graph-wrap">
        <div class="graph-header">
          <span class="graph-title" id="graphTitle">Wind — last 12h + next 6h</span>
          <div class="graph-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#0052cc"></div>Wind (km/h)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#de350b;border-top:2px dashed #de350b;height:0"></div>Gusts (km/h)</div>
          </div>
        </div>
        <div class="graph-canvas-wrap"><canvas id="windChart"></canvas></div>
      </div>
    </div>
  </div>

</div><!-- /main -->
</div><!-- /app -->

<!-- Version badge -->
<div id="versionBadge" style="position:fixed;bottom:10px;right:14px;font-size:10.5px;font-weight:700;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 9px;z-index:300;letter-spacing:.3px;box-shadow:var(--shadow);user-select:none">v1.0</div>

<!-- Mobile nav -->
<nav class="bottom-nav">
  <button class="bottom-nav-item active" id="mob-board" onclick="switchTab('board')"><span class="nav-icon">📋</span>Tasks</button>
  <button class="bottom-nav-item" id="mob-news" onclick="switchTab('news')"><span class="nav-icon">⚡</span>News</button>
  <button class="bottom-nav-item" id="mob-para" onclick="switchTab('para')"><span class="nav-icon">🪂</span>Wind</button>
  <button class="bottom-nav-item" onclick="openSettings()"><span class="nav-icon">⚙️</span>Settings</button>
</nav>

<!-- TASK MODAL -->
<div class="overlay" id="taskOverlay" onclick="overlayClose(event,'taskOverlay')">
  <div class="modal">
    <div class="modal-drag-bar"></div>
    <h2 id="taskModalTitle">New Task</h2>
    <div class="form-group"><label>Title *</label><input type="text" id="fTitle" placeholder="What needs to be done?"/></div>
    <div class="form-group"><label>Description</label><textarea id="fDesc" rows="2" placeholder="Optional context…"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Category</label><select id="fCategory"></select></div>
      <div class="form-group"><label>Priority</label><select id="fPriority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Column</label><select id="fColumn"><option value="backlog">Backlog</option><option value="todo">To Do</option><option value="progress">In Progress</option><option value="review">Review</option><option value="done">Done</option></select></div>
      <div class="form-group"><label>Due date</label><input type="date" id="fDue"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTaskModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save task</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsOverlay" onclick="overlayClose(event,'settingsOverlay')">
  <div class="settings-panel">
    <div class="modal-drag-bar"></div>
    <h2>Categories</h2>
    <p class="subtitle">Rename, recolour, or remove topics.</p>
    <div class="cat-list" id="catList"></div>
    <button class="btn-add-cat" onclick="addCategory()">＋ Add category</button>
    <hr class="settings-divider">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
/* ══════ CONSTANTS ══════ */
const PALETTE=['#0052cc','#00875a','#6554c0','#de350b','#ff8b00','#00b8d9','#57d9a3','#ff5630','#8777d9','#2684ff','#172b4d','#97a0af'];
const DEFAULT_CATS=[{id:'work',label:'Work',color:'#0052cc'},{id:'personal',label:'Personal',color:'#6554c0'},{id:'house',label:'House',color:'#00875a'}];
const COLUMNS=[{id:'backlog',label:'Backlog',dot:'#97a0af'},{id:'todo',label:'To Do',dot:'#ff8b00'},{id:'progress',label:'In Progress',dot:'#0052cc'},{id:'review',label:'Review',dot:'#6554c0'},{id:'done',label:'Done',dot:'#00875a'}];
const SEED_TASKS=[
  {id:'t1',title:"Review Rogier's thesis document",desc:'Feedback from Javi + Morris (v. 02/06)',cat:'work',priority:'high',col:'todo',due:'',created:Date.now()},
  {id:'t2',title:'Architecture decision: EV fleet telemetry',desc:'Evaluate MQTT vs WebSocket for real-time monitoring',cat:'work',priority:'high',col:'backlog',due:'',created:Date.now()},
  {id:'t3',title:'Research Amsterdam neighbourhoods',desc:'Compare Jordaan, Oud-West, De Pijp for house purchase',cat:'house',priority:'medium',col:'progress',due:'',created:Date.now()},
  {id:'t4',title:'SE1-T112 watchdog — verify in prod',desc:'Morris marked closed. Confirm stable.',cat:'work',priority:'medium',col:'review',due:'',created:Date.now()},
];
const NEWS_SOURCES=[
  {id:'all',label:'All Sources',color:'#172b4d',bg:'#f4f5f7'},
  {id:'electrive',label:'Electrive',color:'#0052cc',bg:'#e6f0ff',feed:'https://electrive.com/feed/'},
  {id:'electrek',label:'Electrek',color:'#00875a',bg:'#e3fcef',feed:'https://electrek.co/feed/'},
  {id:'insideevs',label:'InsideEVs',color:'#de350b',bg:'#ffebe6',feed:'https://insideevs.com/rss/articles/'},
  {id:'cleantec',label:'CleanTech',color:'#6554c0',bg:'#ede8ff',feed:'https://cleantechnica.com/feed/'},
];
const RSS2JSON='https://api.rss2json.com/v1/api.json?count=12&rss_url=';
const NEWS_CACHE='javi_news_v3', NEWS_TTL=30*60*1000;

/* ══════ STATE ══════ */
let tasks=[],cats=[],activeFilter='all',editingTaskId=null,settingsDraft=[];
let dragId=null,touchClone=null,touchOffX=0,touchOffY=0;
let activeTab='board',newsArticles=[],newsFilter='all',newsLoading=false;
let sidebarCollapsed=localStorage.getItem('sc')==='1';
let paraMap=null,paraMarkers=[],windChart=null;
let paraLat=null,paraLon=null,paraRadius=10,paraStations=[];
let selectedStation=null;

/* ══════ PERSIST ══════ */
function loadState(){
  try{tasks=JSON.parse(localStorage.getItem('javi_tasks_v3')||'null')||SEED_TASKS;}catch{tasks=SEED_TASKS;}
  try{cats=JSON.parse(localStorage.getItem('javi_cats_v3')||'null')||DEFAULT_CATS;}catch{cats=DEFAULT_CATS;}
}
function saveState(){localStorage.setItem('javi_tasks_v3',JSON.stringify(tasks));localStorage.setItem('javi_cats_v3',JSON.stringify(cats));}

/* ══════ SIDEBAR ══════ */
function toggleSidebar(){sidebarCollapsed=!sidebarCollapsed;localStorage.setItem('sc',sidebarCollapsed?'1':'0');document.getElementById('sidebar').classList.toggle('collapsed',sidebarCollapsed);}
function initSidebar(){if(sidebarCollapsed)document.getElementById('sidebar').classList.add('collapsed');}

/* ══════ TABS ══════ */
function switchTab(tab){
  activeTab=tab;
  ['board','news','para'].forEach(t=>{
    document.getElementById(`panel-${t}`).classList.toggle('active',t===tab);
    document.getElementById(`nav-${t}`)?.classList.toggle('active',t===tab);
    document.getElementById(`mob-${t}`)?.classList.toggle('active',t===tab);
  });
  // settings button in footer should never appear active
  document.querySelectorAll('.sidebar-footer .nav-item').forEach(el=>el.classList.remove('active'));
  if(tab==='news'){document.getElementById('newsBadge').style.display='none';if(!newsArticles.length)fetchNews(false);}
  if(tab==='para'){initParaMap();}
}

/* ══════ BOARD ══════ */
function renderFilterBar(){const bar=document.getElementById('filterBar');if(!bar)return;bar.innerHTML=[{id:'all',label:'All'},...cats].map(c=>`<button class="filter-btn${activeFilter===c.id?' active':''}" onclick="setFilter('${c.id}')">${esc(c.label)}</button>`).join('');}
function setFilter(f){activeFilter=f;render();}
function renderStats(){const total=tasks.length,done=tasks.filter(t=>t.col==='done').length,prog=tasks.filter(t=>t.col==='progress').length,high=tasks.filter(t=>t.priority==='high'&&t.col!=='done').length;document.getElementById('statsBar').innerHTML=`<span>${total} tasks</span><span>·</span><span><strong>${done}</strong> done</span><span>·</span><span><strong>${prog}</strong> in progress</span><span>·</span><span class="${high>0?'stat-danger':''}"><strong>${high}</strong> high-priority open</span>`;}
function filteredTasks(c){return tasks.filter(t=>t.col===c&&(activeFilter==='all'||t.cat===activeFilter));}
function render(){
  renderFilterBar();renderStats();
  const board=document.getElementById('board');board.innerHTML='';
  COLUMNS.forEach(col=>{
    const ct=filteredTasks(col.id);
    const colEl=document.createElement('div');colEl.className='column';
    colEl.innerHTML=`<div class="col-header"><div class="col-label"><span class="col-dot" style="background:${col.dot}"></span>${esc(col.label)}</div><span class="col-count">${ct.length}</span></div>`;
    const body=document.createElement('div');body.className='col-body';body.dataset.col=col.id;
    setupDropZone(body,col.id);
    if(!ct.length)body.innerHTML='<div class="empty-col">Drop here</div>';
    else ct.forEach(t=>body.appendChild(makeCard(t)));
    colEl.appendChild(body);
    const ab=document.createElement('button');ab.className='btn-add-col';ab.textContent='+ Add task';ab.onclick=()=>openTaskModal(col.id);
    colEl.appendChild(ab);board.appendChild(colEl);
  });
}
function makeCard(t){
  const card=document.createElement('div');card.className='card';card.dataset.id=t.id;
  const cat=cats.find(c=>c.id===t.cat)||{label:t.cat,color:'#97a0af'};
  const ts=`background:${cat.color}22;color:${cat.color}`;
  const due=t.due?`<span class="card-date${isOverdue(t.due)?' overdue':''}">📅 ${fmtDate(t.due)}</span>`:'<span></span>';
  card.innerHTML=`<div class="card-tags"><span class="tag" style="${ts}">${esc(cat.label)}</span><span class="tag tag-priority-${t.priority}">${t.priority}</span></div><div class="card-title">${esc(t.title)}</div>${t.desc?`<div class="card-desc">${esc(t.desc)}</div>`:''}<div class="card-footer">${due}<div class="card-actions"><button class="btn-card" onclick="editTask('${t.id}')">✏️</button><button class="btn-card del" onclick="deleteTask('${t.id}')">🗑</button></div></div>`;
  setupDrag(card,t.id);return card;
}
function isOverdue(d){return d&&new Date(d)<new Date(new Date().toDateString());}
function fmtDate(d){if(!d)return'';const p=d.split('-');return`${p[2]}/${p[1]}`;}

/* ══════ DRAG ══════ */
function setupDrag(card,tid){card.draggable=true;card.addEventListener('dragstart',()=>{dragId=tid;setTimeout(()=>card.classList.add('dragging'),0);});card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragId=null;});card.addEventListener('touchstart',e=>onTouchStart(e,tid,card),{passive:false});}
function setupDropZone(body,colId){body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');});body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');dropTo(colId);});}
function dropTo(colId){if(!dragId)return;const t=tasks.find(t=>t.id===dragId);if(t){t.col=colId;saveState();render();}dragId=null;}
function onTouchStart(e,tid,srcCard){if(e.touches.length!==1)return;if(e.target.closest('button'))return;dragId=tid;const touch=e.touches[0],rect=srcCard.getBoundingClientRect();touchOffX=touch.clientX-rect.left;touchOffY=touch.clientY-rect.top;touchClone=srcCard.cloneNode(true);touchClone.classList.add('touch-drag');touchClone.style.width=rect.width+'px';touchClone.style.left=(touch.clientX-touchOffX)+'px';touchClone.style.top=(touch.clientY-touchOffY)+'px';document.body.appendChild(touchClone);srcCard.classList.add('dragging');document.addEventListener('touchmove',onTouchMove,{passive:false});document.addEventListener('touchend',onTouchEnd,{once:true});document.addEventListener('touchcancel',onTouchEnd,{once:true});}
function onTouchMove(e){e.preventDefault();const touch=e.touches[0];if(touchClone){touchClone.style.left=(touch.clientX-touchOffX)+'px';touchClone.style.top=(touch.clientY-touchOffY)+'px';}document.querySelectorAll('.col-body').forEach(b=>b.classList.remove('drag-over'));document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.col-body')?.classList.add('drag-over');}
function onTouchEnd(){document.removeEventListener('touchmove',onTouchMove);if(touchClone){touchClone.remove();touchClone=null;}document.querySelectorAll('.card.dragging').forEach(c=>c.classList.remove('dragging'));document.querySelectorAll('.col-body.drag-over').forEach(b=>{b.classList.remove('drag-over');dropTo(b.dataset.col);});dragId=null;}

/* ══════ TASK MODAL ══════ */
function populateCatSelect(){document.getElementById('fCategory').innerHTML=cats.map(c=>`<option value="${c.id}">${esc(c.label)}</option>`).join('');}
function openTaskModal(colId){editingTaskId=null;document.getElementById('taskModalTitle').textContent='New Task';document.getElementById('fTitle').value='';document.getElementById('fDesc').value='';document.getElementById('fPriority').value='medium';document.getElementById('fDue').value='';populateCatSelect();document.getElementById('fColumn').value=colId||'backlog';document.getElementById('taskOverlay').classList.add('open');setTimeout(()=>document.getElementById('fTitle').focus(),60);}
function editTask(id){const t=tasks.find(t=>t.id===id);if(!t)return;editingTaskId=id;document.getElementById('taskModalTitle').textContent='Edit Task';populateCatSelect();document.getElementById('fTitle').value=t.title;document.getElementById('fDesc').value=t.desc||'';document.getElementById('fCategory').value=t.cat;document.getElementById('fPriority').value=t.priority;document.getElementById('fColumn').value=t.col;document.getElementById('fDue').value=t.due||'';document.getElementById('taskOverlay').classList.add('open');}
function closeTaskModal(){document.getElementById('taskOverlay').classList.remove('open');editingTaskId=null;}
function saveTask(){const title=document.getElementById('fTitle').value.trim();if(!title){document.getElementById('fTitle').focus();return;}const d={title,desc:document.getElementById('fDesc').value.trim(),cat:document.getElementById('fCategory').value,priority:document.getElementById('fPriority').value,col:document.getElementById('fColumn').value,due:document.getElementById('fDue').value};if(editingTaskId)Object.assign(tasks.find(t=>t.id===editingTaskId),d);else tasks.push({id:uid(),created:Date.now(),...d});saveState();render();closeTaskModal();}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);saveState();render();}

/* ══════ SETTINGS ══════ */
function openSettings(){settingsDraft=cats.map(c=>({...c}));renderCatList();document.getElementById('settingsOverlay').classList.add('open');}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('open');settingsDraft=[];}
function renderCatList(){document.getElementById('catList').innerHTML=settingsDraft.map((c,i)=>`<div class="cat-item"><div class="cat-swatch" style="background:${c.color}" onclick="toggleColorPicker(${i})"></div><input class="cat-name-input" value="${esc(c.label)}" oninput="settingsDraft[${i}].label=this.value" placeholder="Name"/><button class="cat-del-btn" onclick="removeCat(${i})">✕</button></div><div class="color-picker-wrap" id="picker-${i}">${PALETTE.map(col=>`<div class="color-swatch${c.color===col?' selected':''}" style="background:${col}" onclick="pickColor(${i},'${col}',this)"></div>`).join('')}</div>`).join('');}
function toggleColorPicker(i){document.querySelectorAll('.color-picker-wrap.open').forEach(p=>{if(p.id!==`picker-${i}`)p.classList.remove('open');});document.getElementById(`picker-${i}`).classList.toggle('open');}
function pickColor(i,color,el){settingsDraft[i].color=color;el.closest('.cat-item').querySelector('.cat-swatch').style.background=color;el.closest('.color-picker-wrap').querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');}
function addCategory(){settingsDraft.push({id:uid(),label:'New category',color:PALETTE[settingsDraft.length%PALETTE.length]});renderCatList();const inp=document.querySelectorAll('.cat-name-input');inp[inp.length-1]?.focus();inp[inp.length-1]?.select();}
function removeCat(i){if(settingsDraft.length<=1){alert('Need at least one category.');return;}settingsDraft.splice(i,1);renderCatList();}
function saveSettings(){document.querySelectorAll('.cat-name-input').forEach((inp,i)=>{if(settingsDraft[i])settingsDraft[i].label=inp.value.trim();});if(settingsDraft.some(c=>!c.label.trim())){alert('All categories need a name.');return;}cats=settingsDraft.map(c=>({...c}));if(activeFilter!=='all'&&!cats.find(c=>c.id===activeFilter))activeFilter='all';saveState();render();closeSettings();}

/* ══════ NEWS ══════ */
async function fetchNews(force=false){
  if(newsLoading)return;
  if(!force){try{const c=JSON.parse(localStorage.getItem(NEWS_CACHE)||'null');if(c&&Date.now()-c.ts<NEWS_TTL){newsArticles=c.articles;renderNews();setLastUpdated(c.ts);return;}}catch{}}
  newsLoading=true;setRefreshSpinning(true);renderNewsLoading();
  const fetches=NEWS_SOURCES.filter(s=>s.feed).map(s=>fetch(RSS2JSON+encodeURIComponent(s.feed)).then(r=>r.json()).then(data=>({source:s,items:(data.items||[]).map(item=>({id:item.guid||item.link,title:item.title||'',link:item.link||'',excerpt:stripHtml(item.description||item.content||'').slice(0,220),thumbnail:item.thumbnail||extractImg(item.description||item.content||''),date:item.pubDate?new Date(item.pubDate):new Date(),sourceId:s.id,sourceLabel:s.label,sourceColor:s.color,sourceBg:s.bg}))})).catch(()=>({source:s,items:[]})));
  const results=await Promise.all(fetches);
  newsArticles=results.flatMap(r=>r.items).sort((a,b)=>b.date-a.date);
  localStorage.setItem(NEWS_CACHE,JSON.stringify({ts:Date.now(),articles:newsArticles}));
  setLastUpdated(Date.now());newsLoading=false;setRefreshSpinning(false);renderNews();
  if(activeTab!=='news')document.getElementById('newsBadge').style.display='inline-block';
}
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent||d.innerText||'';}
function extractImg(h){const m=h.match(/<img[^>]+src="([^"]+)"/i);return m?m[1]:null;}
function setLastUpdated(ts){const el=document.getElementById('lastUpdated');if(!el)return;const ago=Math.round((Date.now()-ts)/60000);el.textContent=ago<1?'Just updated':`Updated ${ago}m ago`;}
function setRefreshSpinning(on){document.getElementById('refreshBtn')?.classList.toggle('spinning',on);}

function initParaMap(){
  if(paraMap) return;
  setTimeout(()=>{
    paraMap = L.map('paraMap',{zoomControl:true,attributionControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors', maxZoom:18
    }).addTo(paraMap);
    paraMap.setView([52.22,5.18],8);
  },100);
}

function locateAndFetch(){
  const btn=document.getElementById('locateBtn');
  btn.classList.add('loading'); btn.textContent='📍 Locating…';
  setParaStatus('orange','Getting location…');
  navigator.geolocation.getCurrentPosition(
    pos=>{
      paraLat=pos.coords.latitude; paraLon=pos.coords.longitude;
      btn.classList.remove('loading'); btn.textContent='↻ Refresh';
      setParaStatus('green',`${paraLat.toFixed(3)}°N  ${paraLon.toFixed(3)}°E`);
      fetchWindData();
    },
    ()=>{
      btn.classList.remove('loading'); btn.textContent='📍 Get my location';
      setParaStatus('red','Location denied — enable GPS and retry');
    },
    {enableHighAccuracy:true,timeout:12000}
  );
}

function setParaStatus(color,text){
  document.getElementById('statusDot').className='dot '+color;
  document.getElementById('statusText').textContent=text;
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function fetchWindData(){
  showParaLoading(true);
  setParaStatus('orange','Finding nearby stations…');

  // Find the 10 nearest real WMO stations
  const nearby = WMO_STATIONS
    .map(([name,lat,lon,country])=>({name,lat,lon,country,dist:Math.round(haversine(paraLat,paraLon,lat,lon))}))
    .sort((a,b)=>a.dist-b.dist)
    .slice(0,10);

  // Add user's own position as first entry
  const points=[{name:'📍 Your position',lat:paraLat,lon:paraLon,country:'',dist:0,isCenter:true},...nearby];

  try{
    const stations=await Promise.all(points.map(async p=>{
      const w=await getCurrentWind(p.lat,p.lon);
      return{
        name:    p.name,
        country: p.country,
        lat:     p.lat,
        lon:     p.lon,
        dist:    p.dist,
        isCenter:!!p.isCenter,
        wind:    w.wind,
        gust:    w.gust,
        dir:     w.dir,
        src:     w.src,
        chart:   null,
      };
    }));

    paraStations=stations;
    selectedStation=stations[0];
    renderParaMap();
    renderParaStations();
    await fetchAndRenderChart(stations[0]);
    const dwd=stations.filter(s=>s.src==='DWD').length;
    setParaStatus('green',`${nearby.length} WMO stations · ${dwd} real DWD obs · ${stations.length-dwd} ECMWF · just now`);
  } catch(e){
    setParaStatus('red','Failed: '+e.message);
  }
  showParaLoading(false);
}

/* Always fetch fresh chart data for the selected station */
/* ── Fetch current wind: Bright Sky (real DWD obs) → Open-Meteo fallback ── */
async function getCurrentWind(lat,lon){
  try{
    const bs=await fetch(`https://api.brightsky.dev/current_weather?lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}`).then(r=>r.json());
    const w=bs.weather;
    if(w&&w.wind_speed!=null){
      return{wind:Math.round(w.wind_speed),gust:Math.round(w.wind_gust_speed||w.wind_speed),dir:Math.round(w.wind_direction||0),src:'DWD'};
    }
  }catch{}
  // fallback
  const om=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=windspeed_10m,windgusts_10m,winddirection_10m&windspeed_unit=kmh&timezone=auto`).then(r=>r.json());
  const c=om.current||{};
  return{wind:Math.round(c.windspeed_10m||0),gust:Math.round(c.windgusts_10m||0),dir:Math.round(c.winddirection_10m||0),src:'ECMWF'};
}

/* ── Fetch chart data: 15-min (48 past + 192 future = 12h + 48h) → hourly fallback ── */
async function fetchAndRenderChart(station){
  document.getElementById('graphTitle').textContent=`Loading ${station.name}…`;
  try{
    // 15-min: 48 intervals back (12h) + 48 forward (12h)
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${station.lat.toFixed(4)}&longitude=${station.lon.toFixed(4)}&minutely_15=windspeed_10m,windgusts_10m&past_minutely_15=48&forecast_minutely_15=48&windspeed_unit=kmh&timezone=auto`;
    const d=await fetch(u).then(r=>r.json());
    const h=d.minutely_15;
    if(!h||!h.time||!h.time.length) throw new Error('no 15min');
    const nowISO=new Date().toISOString().slice(0,16);
    let idx=h.time.findIndex(t=>t>=nowISO);
    if(idx<0) idx=48;
    station.chart={times:h.time,wind:h.windspeed_10m,gust:h.windgusts_10m,nowIdx:idx,res:'15 min'};
  }catch{
    try{
      // hourly fallback: 12h past + 12h future
      const u=`https://api.open-meteo.com/v1/forecast?latitude=${station.lat.toFixed(4)}&longitude=${station.lon.toFixed(4)}&hourly=windspeed_10m,windgusts_10m&past_hours=12&forecast_hours=12&windspeed_unit=kmh&timezone=auto`;
      const d=await fetch(u).then(r=>r.json());
      const h=d.hourly;
      const nowISO=new Date().toISOString().slice(0,13);
      let idx=h.time.findIndex(t=>t.startsWith(nowISO));
      if(idx<0) idx=12;
      station.chart={times:h.time,wind:h.windspeed_10m,gust:h.windgusts_10m,nowIdx:idx,res:'1 hour'};
    }catch{
      document.getElementById('graphTitle').textContent='Chart unavailable';
      return;
    }
  }
  renderWindChart(station);
}

function showParaLoading(on){document.getElementById('paraLoading').style.display=on?'flex':'none';}

/* Wind color by speed */
function windColor(spd){
  if(spd<10) return '#00875a'; // calm - green
  if(spd<20) return '#57d9a3'; // light
  if(spd<30) return '#ff8b00'; // moderate
  if(spd<40) return '#ff5630'; // strong
  return '#de350b';             // very strong
}
function windClass(spd){
  if(spd<10) return 'w-calm';
  if(spd<20) return 'w-light';
  if(spd<30) return 'w-mod';
  return 'w-strong';
}
function windLabel(spd){
  if(spd<10) return 'Calm';
  if(spd<20) return 'Light';
  if(spd<30) return 'Moderate';
  if(spd<40) return 'Strong';
  return 'Very strong';
}
function dirToArrow(deg){
  // arrow pointing in wind direction (FROM)
  const arrows=['↓','↙','←','↖','↑','↗','→','↘'];
  return arrows[Math.round(deg/45)%8];
}
function dirToName(deg){
  const names=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return names[Math.round(deg/22.5)%16];
}

function renderParaMap(){
  if(!paraMap) return;
  // Clear old markers
  paraMarkers.forEach(m=>m.remove());
  paraMarkers=[];
  if(!paraStations.length) return;

  const bounds=[];
  paraStations.forEach((s,i)=>{
    const color=windColor(s.wind);
    const sz = s.isCenter ? 44 : 36;
    const icon=L.divIcon({
      className:'',
      html:`<div class="wind-marker-wrap">
        <div class="wind-marker-circle" style="background:${color};width:${sz}px;height:${sz}px;font-size:${s.isCenter?13:11}px">
          ${s.isCenter?'📍':s.wind}
        </div>
        <div class="wind-marker-pin" style="background:${color}"></div>
        <div class="wind-marker-name" style="color:${color}">${s.name}</div>
      </div>`,
      iconSize:[sz+40, sz+30],
      iconAnchor:[(sz+40)/2, sz+10],
    });
    const marker=L.marker([s.lat,s.lon],{icon}).addTo(paraMap);
    marker.bindPopup(`<b>${s.name}</b><br>💨 ${s.wind} km/h ${dirToName(s.dir)}<br>⚡ Gusts: ${s.gust} km/h<br><small style="color:#5e6c84">${windLabel(s.wind)}</small><br><a href="https://www.windy.com/?wind,${s.lat.toFixed(3)},${s.lon.toFixed(3)},12" target="_blank" style="font-size:11px;color:#0052cc">Open in Windy ↗</a>`);
    marker.on('click',()=>{selectStation(i);});
    paraMarkers.push(marker);
    bounds.push([s.lat,s.lon]);
  });

  if(bounds.length>1) paraMap.fitBounds(bounds,{padding:[30,30]});
  else paraMap.setView([paraLat,paraLon],12);
}

function selectStation(idx){
  selectedStation=paraStations[idx];
  document.querySelectorAll('.station-card').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  // Always fetch fresh — ensures chart always updates when switching stations
  fetchAndRenderChart(selectedStation);
}

function renderParaStations(){
  const wrap=document.getElementById('paraStations');
  wrap.innerHTML=`<div class="stations-header">${paraStations.length-1} WMO stations · data: Open-Meteo</div>`+
  paraStations.map((s,i)=>{
    const gustStr=`${s.gust} km/h`;
    const dirStr=`${dirToName(s.dir)} ${s.dir}°`;
    const windyURL=`https://www.windy.com/?wind,${s.lat.toFixed(3)},${s.lon.toFixed(3)},11`;
    const meteoURL=`https://open-meteo.com/en/docs?latitude=${s.lat.toFixed(4)}&longitude=${s.lon.toFixed(4)}#current=windspeed_10m,windgusts_10m,winddirection_10m`;
    const meta=s.isCenter?'Your GPS position':`${s.country} · ${s.dist} km away`;
    return`<div class="station-card${i===0?' selected':''}" onclick="selectStation(${i})">
      <div class="station-top">
        <div style="flex:1;min-width:0">
          <div class="station-name">${esc(s.name)}</div>
          <div style="font-size:10px;color:var(--text-muted);font-weight:600;margin-top:2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span>${meta}</span><span style="background:${s.src==='DWD'?'#e3fcef':'#e6f0ff'};color:${s.src==='DWD'?'#00875a':'#0052cc'};padding:1px 5px;border-radius:3px;font-size:9px;font-weight:800">${s.src||'ECMWF'}</span>
            <a href="${windyURL}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-weight:700" onclick="event.stopPropagation()">Windy ↗</a>
            <a href="${meteoURL}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-weight:700" onclick="event.stopPropagation()">Open-Meteo ↗</a>
          </div>
        </div>
      </div>
      <div class="station-wind">
        <div class="wind-speed-big ${windClass(s.wind)}">${s.wind}<small style="font-size:13px;font-weight:600"> km/h</small></div>
        <div class="wind-arrow" style="transform:rotate(${s.dir}deg)">${dirToArrow(s.dir)}</div>
        <div class="wind-details">
          <div class="wind-detail-row">⚡ Gusts <strong>${gustStr}</strong></div>
          <div class="wind-detail-row">🧭 <strong>${dirStr}</strong></div>
          <div class="wind-detail-row" style="color:${windColor(s.wind)};font-weight:600">${windLabel(s.wind)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* Chart.js plugin: draw a "NOW" vertical line */
const nowLinePlugin={
  id:'nowLine',
  afterDraw(chart,_,opts){
    try{
      const {ctx:c,chartArea,scales}=chart;
      if(!chartArea||opts.nowPos==null||!scales.x) return;
      // getPixelForValue is correct in Chart.js 4 for index-based x axis
      const x=scales.x.getPixelForValue(opts.nowPos);
      if(!x||isNaN(x)) return;
      c.save();
      c.strokeStyle='rgba(0,82,204,.5)';c.lineWidth=1.5;c.setLineDash([4,3]);
      c.beginPath();c.moveTo(x,chartArea.top);c.lineTo(x,chartArea.bottom);c.stroke();
      c.setLineDash([]);c.fillStyle='#0052cc';
      c.font='bold 9px system-ui';c.textAlign='center';
      c.fillText('NOW',x,chartArea.top+10);
      c.restore();
    }catch(e){}
  }
};

function renderWindChart(station){
  if(!station||!station.chart) return;
  const h=station.chart;
  const idx=h.nowIdx;
  const nowPos=idx; // all data already sliced to [0..end], nowIdx is the offset

  const labels=h.times.map(t=>{
    const d=new Date(t);
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  });

  // Destroy old chart and replace the canvas element entirely (safest approach)
  if(windChart){ windChart.destroy(); windChart=null; }
  const wrap=document.querySelector('.graph-canvas-wrap');
  wrap.innerHTML='<canvas id="windChart"></canvas>';
  const ctx=document.getElementById('windChart').getContext('2d');

  windChart=new Chart(ctx,{
    type:'line',
    plugins:[nowLinePlugin],
    data:{
      labels,
      datasets:[
        {label:'Gusts (km/h)',data:h.gust,borderColor:'#de350b',borderDash:[4,3],borderWidth:2,pointRadius:0,pointHoverRadius:5,tension:.4,fill:false},
        {label:'Wind (km/h)', data:h.wind,borderColor:'#0052cc',backgroundColor:'rgba(0,82,204,.09)',borderWidth:2.5,pointRadius:0,pointHoverRadius:5,tension:.4,fill:true},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        nowLine:{nowPos},
        tooltip:{
          enabled:true,
          backgroundColor:'rgba(23,43,77,.92)',
          titleColor:'#fff',bodyColor:'#e0e6f0',
          padding:10,cornerRadius:6,
          callbacks:{
            title:items=>`${items[0].label} · ${station.name}`,
            label:item=>`${item.dataset.label}: ${item.parsed.y} km/h`,
          }
        },
      },
      scales:{
        x:{
          grid:{color:'#f0f2f5'},
          ticks:{
            maxTicksLimit:24,font:{size:10},color:'#5e6c84',
            callback:(val,i)=>i%4===0?labels[i]:'',
          }
        },
        y:{
          min:0,grid:{color:'#f0f2f5'},
          ticks:{font:{size:10},color:'#5e6c84'},
          title:{display:true,text:'km/h',font:{size:10},color:'#5e6c84'},
        }
      }
    }
  });
  document.getElementById('graphTitle').textContent=`${station.name} — 12h past + 12h forecast · ${h.res||'hourly'}`;
}

/* ══════ HELPERS ══════ */
function uid(){return'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function overlayClose(e,id){if(e.target.id===id){if(id==='taskOverlay')closeTaskModal();else closeSettings();}}
document.addEventListener('keydown',e=>{
  const inInput=e.target.matches('input,textarea,select');
  if(e.key==='n'&&!inInput&&!document.querySelector('.overlay.open'))openTaskModal();
  if(e.key==='Escape'){closeTaskModal();closeSettings();}
});
